    related_workflow_module: 'reaxkit.workflows.file_tools.ffield_workflow: get_ffield_opt_results'
    tags:
    - force field
    - force field optimization report
    notes: []
    aliases:
    - force field optimization report
    - force-field-optimization-report
    help_search_examples:
    - reaxkit help "force field optimization report"
    - run force field optimization report
  ffield_opt_bulk_modulus:
    consumes_dataclass: ForceFieldOptimizationResultsData
    implementation_module: 'reaxkit.analysis.force_field.report: force_field_optimization_report_bulk_modulus'
    description: Derives bulk-modulus metrics from optimization report data. Use it
