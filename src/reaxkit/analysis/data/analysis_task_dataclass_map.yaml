    - run force field data
  get_ffield_opt_progress_data:
    consumes_dataclass: ForceFieldOptimizationProgressData
    implementation_module: 'reaxkit.analysis.force_field.optimization: force_field_optimization'
    description: Analyzes force-field optimization progress across iterations using
      parsed training or optimization output. It helps evaluate convergence, objective
      changes, and the progression of fitted parameter sets.
    related_workflow_module: 'reaxkit.workflows.file_tools.ffield_workflow: get_ffield_opt_progress_data'
