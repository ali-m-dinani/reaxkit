    related_workflow_module: 'reaxkit.workflows.file_tools.ffield_workflow: ffield_opt_bulk_modulus'
    tags:
    - force field
    - bulk modulus
    - force field optimization report
    notes: []
    aliases:
    - force field optimization report bulk modulus
    - force-field-optimization-report-bulk-modulus
    help_search_examples:
    - reaxkit help "force field optimization report bulk modulus"
    - run force field optimization report bulk modulus
  get_ffield_opt_eos:
    consumes_dataclass: ForceFieldOptimizationResultsData
    implementation_module: 'reaxkit.analysis.force_field.report: force_field_optimization_report_eos'
    description: Derives equation-of-state relationships from force-field optimization
      report data. It is intended for energy-volume, pressure-volume, and related
      property curves in fitted force fields.
    related_workflow_module: 'reaxkit.workflows.file_tools.ffield_workflow: get_ffield_opt_eos'
    tags:
    - force field
    - equation of state
    - force field optimization report
    notes: []
    aliases:
    - force field optimization report eos
    - force-field-optimization-report-eos
    help_search_examples:
    - reaxkit help "force field optimization report equation of state"
    - run force field optimization report equation of state
  geometry_optimization_data:
    consumes_dataclass: GeometryOptimizationProgressData
    implementation_module: 'reaxkit.analysis.timeseries.geometry_optimization: geometry_optimization_data'
