    - run force field optimization
  force_field_optimization_parameters:
    consumes_dataclass: ForceFieldOptimizationParameterData
    implementation_module: 'reaxkit.analysis.params.params: force_field_optimization_parameters'
    description: Extracts optimizable parameter definitions, bounds, and metadata
      from params-style input. Use it to understand which ReaxFF parameters are active
