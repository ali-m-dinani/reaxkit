    - largest-molecule-by-mass
    help_search_examples:
    - reaxkit help "largest molecule by mass"
    - run largest molecule by mass
  largest_molecule_composition:
    consumes_dataclass: MolecularAnalysisData
    implementation_module: 'reaxkit.analysis.molecular_analysis.molecular_analysis:
      largest_molecule_composition'
    description: Reports composition of the largest molecule over time, including
      atom counts or formula-like summaries where available. It complements largest-mass
      tracking by explaining what the dominant cluster contains.
    related_workflow_module: 'reaxkit.workflows.molecular_analysis_workflow: largest_molecule_composition'
    tags:
    - molecular analysis
    - largest molecule
    notes: []
    aliases:
    - largest molecule composition
    - largest-molecule-composition
    help_search_examples:
    - reaxkit help "largest molecule composition"
    - run largest molecule composition
  molecular_frequency_series:
