_meta:
  version: '1.0'
  source: analysis task required_data declarations
  purpose: Maps analysis tasks to the dataclass each task consumes.
  last_updated: '2026-05-21'
tasks:
  active_site_events:
    consumes_dataclass: ConnectivityTrajectoryData
    implementation_module: 'reaxkit.analysis.active_sites.events: active_site_events'
    description: Detects time-resolved active-site events from connectivity trajectories
      by comparing bonded environments across frames. Use it to identify when selected
      sites form, break, or reorganize bonds during reactive simulations.
    related_workflow_module: 'reaxkit.workflows.active_site_workflow: active_site_events'
    tags:
    - active site
    - connectivity trajectory
    notes: []
    aliases:
    - active site events
    - active-site-events
    help_search_examples:
    - reaxkit help "active site events"
    - run active site events
  active_site_structural:
    consumes_dataclass: ConnectivityTrajectoryData
    implementation_module: 'reaxkit.analysis.active_sites.structural: active_site_structural'
    description: Computes structural descriptors for active sites across frames using
      trajectory-aligned connectivity data. It summarizes local neighbor counts, bonding
      patterns, and structural states around selected reactive sites.
    related_workflow_module: 'reaxkit.workflows.active_site_workflow: active_site_structural'
    tags:
    - active site
    - connectivity trajectory
    notes: []
    aliases:
    - active site structural
    - active-site-structural
    help_search_examples:
    - reaxkit help "active site structural"
    - run active site structural
  atomic_kinematics:
    consumes_dataclass: AtomicKinematicsData
    implementation_module: 'reaxkit.analysis.kinematics.kinematics: atomic_kinematics'
    description: Extracts per-atom kinematic quantities from velocity or restart-derived
      data. Use it to analyze atom-level motion, velocity components, acceleration-like
      values, and spatially resolved dynamics.
    related_workflow_module: 'reaxkit.workflows.kinematics_workflow: kinematics'
    tags:
    - atomic kinematics
    - analysis
    notes: []
    aliases:
    - kinematics
    - kinematics heatmap2d
    - kinematics-heatmap2d
    - kinematics plot3d
    - kinematics-plot3d
    help_search_examples:
    - reaxkit help "atomic kinematics"
    - run atomic kinematics
    - reaxkit help "atomic kinematics heatmap2d"
    - run atomic kinematics heatmap2d
    - reaxkit help "atomic kinematics plot3d"
    - run atomic kinematics plot3d
  bond_events:
    consumes_dataclass: ConnectivityData
    implementation_module: 'reaxkit.analysis.connectivity.connectivity: bond_events'
    description: Identifies bond formation and bond breaking events by comparing connectivity
      records. It helps convert raw bond-order snapshots into reaction-event tables
      for later filtering and interpretation.
    related_workflow_module: 'reaxkit.workflows.connectivity_workflow: bond_events'
    tags:
    - connectivity
    - bond order
    notes: []
    aliases:
    - bond events
    - bond-events
    help_search_examples:
    - reaxkit help "bond events"
    - run bond events
  cell_dimensions:
    consumes_dataclass: SimulationData
    implementation_module: 'reaxkit.analysis.timeseries.timeseries: cell_dimensions'
    description: Returns time series for simulation cell lengths, angles, and related
      box dimensions. Use it to inspect expansion, compression, deformation, or volume-coupled
      behavior in ReaxFF runs.
    related_workflow_module: 'reaxkit.workflows.timeseries_workflow: timeseries'
    tags:
    - time series
    - cell dimensions
    - simulation
    notes: []
  charge_series:
    consumes_dataclass: ChargeData
    implementation_module: 'reaxkit.analysis.timeseries.timeseries: charge_series'
    description: Returns time series of selected atomic charges from parsed ReaxFF
      charge output. It is useful for following charge transfer, local oxidation changes,
      and atom-specific electrostatic behavior.
    related_workflow_module: 'reaxkit.workflows.timeseries_workflow: timeseries'
    tags:
    - time series
    - charges
    - charge
    notes: []
  charge_table:
    consumes_dataclass: ChargeData
    implementation_module: 'reaxkit.analysis.electrostatics.charges: charge_table'
    description: Builds tabular views of atomic charge values with atom-indexed rows
      and frame-aware values. Use it to inspect, filter, export, or plot charge data
      outside the raw ReaxFF output format.
    related_workflow_module: 'reaxkit.workflows.electrostatics_workflow: charge-table'
    tags:
    - electrostatics
    - charges
    - charge
    notes: []
    aliases:
    - charge table
    - charge_table
    help_search_examples:
    - reaxkit help "charge table"
    - run charge table
  connection_list:
    consumes_dataclass: ConnectivityData
    implementation_module: 'reaxkit.analysis.connectivity.connectivity: connection_list'
    description: Outputs connectivity neighbor lists and bond-order pairs from parsed
      ReaxFF connectivity data. It exposes the raw bonded relationships that feed
      coordination, hybridization, and bond-event analyses.
    related_workflow_module: 'reaxkit.workflows.connectivity_workflow: connection_list'
    tags:
    - connectivity
    - connections
    notes: []
    aliases:
    - connection list
    - connection-list
    help_search_examples:
    - reaxkit help "connection list"
    - run connection list
  connection_stats:
    consumes_dataclass: ConnectivityData
    implementation_module: 'reaxkit.analysis.connectivity.connectivity: connection_stats'
    description: Computes summary statistics over connectivity data, including bond
      counts, neighbor counts, and bond-order-derived measures. Use it for compact
      comparisons across frames or simulations.
    related_workflow_module: 'reaxkit.workflows.connectivity_workflow: connection_stats'
    tags:
    - connectivity
    - connections
    notes: []
    aliases:
    - connection stats
    - connection-stats
    help_search_examples:
    - reaxkit help "connection stats"
    - run connection stats
  connection_table:
    consumes_dataclass: ConnectivityData
    implementation_module: 'reaxkit.analysis.connectivity.connectivity: connection_table'
    description: Builds a table representation of connectivity records with atoms,
      neighbors, bond orders, and frame context. This makes connectivity output easier
      to query, export, and join with other atom-level data.
    related_workflow_module: 'reaxkit.workflows.connectivity_workflow: connection_table'
    tags:
    - connectivity
    - connections
    notes: []
    aliases:
    - connection table
    - connection-table
    help_search_examples:
    - reaxkit help "connection table"
    - run connection table
  control_value:
    consumes_dataclass: ControlParametersData
    implementation_module: 'reaxkit.analysis.control.control: control_value'
    description: Reads and returns values for control-file keywords from structured
      control-parameter data. Use it to verify simulation settings, compare control
      files, or expose individual ReaxFF options in scripts.
    related_workflow_module: 'reaxkit.workflows.file_tools.control_workflow: gen_control'
    tags:
    - control file
    - control parameters
    notes: []
  coordination:
    consumes_dataclass: ConnectivityData
    implementation_module: 'reaxkit.analysis.connectivity.coordination: coordination'
    description: Computes coordination numbers and local neighbor environments from
      connectivity data. It labels atom environments by neighbor counts or bonding
      context for structural classification and downstream relabeling.
    related_workflow_module: 'reaxkit.workflows.connectivity_workflow: coordination'
    tags:
    - connectivity
    - coordination
    notes: []
    aliases:
    - coordination
    help_search_examples:
    - reaxkit help "coordination"
    - run coordination
  dipole:
    consumes_dataclass: ElectrostaticsData
    implementation_module: 'reaxkit.analysis.electrostatics.electrostatics: dipole'
    description: Computes dipole-moment metrics from electrostatics inputs that combine
      coordinates, charges, connectivity, and optional field data. Use it to quantify
      molecular or system-level charge separation over time.
    related_workflow_module: 'reaxkit.workflows.electrostatics_workflow: dipole'
    tags:
    - electrostatics
    - dipole
    notes: []
    aliases:
    - dipole
    help_search_examples:
    - reaxkit help "dipole"
    - run dipole
  dihedral:
    consumes_dataclass: TrajectoryData
    implementation_module: 'reaxkit.analysis.trajectory.dihedral: dihedral'
    description: Computes dihedral-angle trajectories for selected atom quartets from
      trajectory coordinates. It helps track torsional motion, conformational changes,
      and geometry evolution during a simulation.
    related_workflow_module: 'reaxkit.workflows.trajectory_workflow: diffusivity'
    tags:
    - trajectory
    - analysis
    notes: []
  diffusivity:
    consumes_dataclass: TrajectoryData
    implementation_module: 'reaxkit.analysis.trajectory.diffusivity: diffusivity'
    description: Estimates diffusivity from trajectory displacement statistics, typically
      using mean-squared displacement behavior. Use it to turn atom motion into diffusion
      coefficients for selected species or atom groups.
    related_workflow_module: 'reaxkit.workflows.trajectory_workflow: diffusivity'
    tags:
    - trajectory
    - diffusivity
    notes: []
    aliases:
    - diffusion-coefficient
    - diffusion_coefficient
    help_search_examples:
    - reaxkit help "diffusivity"
    - run diffusivity
  dominant_species:
    consumes_dataclass: MolecularAnalysisData
    implementation_module: 'reaxkit.analysis.molecular_analysis.molecular_analysis:
      dominant_species'
    description: Finds the most frequent molecular species over time from molecular
      analysis output. It highlights dominant reactants, products, or persistent species
      in reactive simulations.
    related_workflow_module: 'reaxkit.workflows.molecular_analysis_workflow: dominant_species'
    tags:
    - molecular analysis
    - dominant species
    notes: []
    aliases:
    - dominant species
    - dominant-species
    help_search_examples:
    - reaxkit help "dominant species"
    - run dominant species
  electric_field_series:
    consumes_dataclass: ElectricFieldData
    implementation_module: 'reaxkit.analysis.timeseries.timeseries: electric_field_series'
    description: Returns electric-field component and magnitude time series from parsed
      field data. Use it to inspect applied-field schedules and align field changes
      with polarization, charge, or structural response.
    related_workflow_module: 'reaxkit.workflows.timeseries_workflow: timeseries'
    tags:
    - time series
    - electric field
    notes: []
  eregime_series:
    consumes_dataclass: EregimeData
    implementation_module: 'reaxkit.analysis.timeseries.timeseries: eregime_series'
    description: Returns time series fields parsed from eregime schedules. It connects
      generated electric-field regime inputs to analysis-ready tables that can be
      compared with simulation response.
    related_workflow_module: 'reaxkit.workflows.timeseries_workflow: timeseries'
    tags:
    - time series
    - electric field regime
    - eregime
    notes: []
  get_ffield_data:
    consumes_dataclass: ForceFieldParametersData
    implementation_module: 'reaxkit.analysis.force_field.force_field: force_field_data'
    description: Extracts and structures force-field parameter sections from ffield-style
