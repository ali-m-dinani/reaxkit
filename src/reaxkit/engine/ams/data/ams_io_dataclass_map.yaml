_meta:
  version: '1.0'
  source: reaxkit.engine.ams.adapter.AMSAdapter
  purpose: Maps AMS loader entrypoints to produced dataclasses and KF section/key sources.
  last_updated: '2026-04-01'
loaders:
  load_kf:
    dataclass: KFFile handle (internal)
    notes:
    - Uses RKFHandler runtime cache keyed by path/size/mtime.
  load_trajectory:
    dataclass: TrajectoryData
    field_map:
      positions:
        section: History
        variable: Coordinates *
        transform: Each entry reshaped to (-1, 3); stacked to (n_frames, n_atoms, 3) with NaN padding.
      elements:
        section: History
        variable: Atom names
        transform: Parsed from mixed spaced/concatenated symbols using chemical-token regex.
      atom_ids:
        source: derived
        transform: 1..n_atoms
      iterations:
        section: General
        variable: Step numbers
        transform: Trim/pad to n_frames.
      atom_labels:
        source: derived
        transform: Per-frame repeat of elements.
    notes: []
  load_connectivity:
    dataclass: ConnectivityData
    field_map:
      connectivity:
        section: History
        variable: ConnTab neighbors *
        supplemental_variable: ConnTab num neighb *
        transform: Unpacked per atom to (n_atoms, max_num_neighb_per_frame), empty cells filled with 0.
      bond_orders:
        section: History
        variable: ConnTab bond order *
        supplemental_variable: ConnTab num neighb *
        transform: Unpacked per atom to (n_atoms, max_num_neighb_per_frame), empty cells filled with 0.0.
      sum_bond_orders:
        section: History
        variable: Total bond orders *
        transform: Stacked to (n_frames, n_atoms) with NaN padding.
      num_lone_pairs:
        section: History
        variable: Lone pairs *
        transform: Stacked to (n_frames, n_atoms) with NaN padding.
      atom_ids:
        source: derived
        transform: 1..n_atoms (n_atoms inferred from ConnTab num neighb when available).
      elements:
        section: History
        variable: Atom names
      iterations:
        section: General
        variable: Step numbers
    notes: []
  load_connectivity_trajectory:
    dataclass: ConnectivityTrajectoryData
    composed_of:
    - ConnectivityData
    - TrajectoryData
    notes: []
  load_simulation:
    dataclass: SimulationData
    field_map:
      atom_ids:
        source: derived
        transform: 1..n_atoms (from ConnTab mol index, then Coordinates, then Atom names).
      elements:
        section: History
        variable: Atom names
      iterations:
        section: General
        variable: Step numbers
      potential_energy:
        section: History
        variable: Energies *
        index: 0
      temperature:
        section: History
        variable: Scalars *
        index: 1
      pressure:
        section: History
        variable: Scalars *
        index: 7
      density:
        section: History
        variable: Scalars *
        index: 0
      molecule_nums:
        section: History
        variable: ConnTab mol index *
        transform: Stacked to (n_frames, n_atoms) with NaN padding.
      cell_lengths:
        section: History
        variable: Unit cell axes *
        transform: 'If 9 values: reshape (3,3) and use row norms; if 3 values: use directly.'
      cell_angles:
        section: History
        variable: Unit cell angles *
        transform: First 3 values per frame.
    notes: []
  load_partial_energy:
    dataclass: PartialEnergyData
    field_map:
      iterations:
        section: General
        variable: Step numbers
      values:
        section: History
        variable: Energies *
        transform: Stacked to (n_frames, 17); NaN padded.
      components:
        source: adapter constant
        value:
        - E_pot
        - E_over_under_coordination
        - Ebond
        - Econj
        - E_angle_conj
        - Efield
        - Ehbo
        - Elp
        - Ecoul
        - E_penalty_double_bond
        - Etors
        - Eval
        - Evdw
        - Echarge
        - E_kin
        - E_tot
        - E_thermostat
    notes: []
  load_charges:
    dataclass: ChargeData
    field_map:
      charges:
        section: History
        variable: Atomic charges *
        transform: Stacked to (n_frames, n_atoms) with NaN padding.
      total_charge:
        source: derived
        transform: Row-wise nansum of charges.
      iterations:
        section: General
        variable: Step numbers
    notes: []
  load_atomic_kinematics:
    dataclass: AtomicKinematicsData
    field_map:
      coordinates:
        section: History
        variable: Coordinates *
        transform: Last entry reshaped to (-1,3) and emitted as DataFrame columns x,y,z.
      velocities:
        section: History
        variable: Velocities *
        transform: Last entry reshaped to (-1,3) and emitted as DataFrame columns vx,vy,vz.
      accelerations:
        section: History
        variable: Acceleration *
        transform: Last entry reshaped to (-1,3) and emitted as DataFrame columns ax,ay,az.
      previous_accelerations:
        source: placeholder
        value: Empty DataFrame with columns [atom_id, ax, ay, az].
    notes: []
  load_atom_temperature:
    dataclass: AtomTemperatureData
    field_map:
      iterations:
        section: General
        variable: Step numbers
      temperatures:
        section: History
        variable: Atom temperature *
        transform: Stacked to (n_frames, n_atoms) with NaN padding.
    notes: []
  load_atom_strain_energy:
    dataclass: AtomStrainEnergyData
    field_map:
      iterations:
        section: General
        variable: Step numbers
      strain_energy:
        section: History
        variable: Strain energy *
        transform: Stacked to (n_frames, n_atoms) with NaN padding.
    notes: []
  load_molecular_analysis:
    dataclass: MolecularAnalysisData
    primary_sections:
    - Molecule
    - Molecules
    - 'Molecules #n'
    field_map:
      molecular_species.iter:
        section: General
        variable: Step numbers
        transform: Mapped by Y from keys 'Num molecules Y'.
      molecular_species.molecular_formula:
        section: Molecule/Molecules
        variable: Molecule name X
      molecular_species.freq:
        section: Molecule/Molecules
        variable: Num molecules Y
      molecular_species.molecular_mass:
        source: fixed
        value: NaN
        notes:
        - Left empty by design for AMS.
      totals.total_molecules:
        section: Molecule/Molecules
        variable: Num molecules Y
        transform: Summed across molecules for each iteration Y.
      totals.total_atoms:
        section: Molecule/Molecules
        variable: Atoms X Y
        transform: Summed counts across molecules for each iteration Y.
      totals.total_molecular_mass:
        source: fixed
        value: NaN
        notes:
        - Left empty by design for AMS.
    notes: []
  load_stress:
    dataclass: StressData
    field_map:
      iterations:
        section: General
        variable: Step numbers
      values:
        section: History
        variable: Atomic stress *
        transform: Each frame reshaped to (-1, 6); stacked to (n_frames, n_atoms, 6) with NaN padding.
      average_values:
        section: History
        variable: Average atomic stress *
        transform: Each frame reshaped to (-1, 6); stacked to (n_frames, n_atoms, 6) with NaN padding.
      iso_values:
        section: History
        variable: Iso atomic stress *
        transform: Stacked to (n_frames, n_atoms) with NaN padding.
      avg_iso_values:
        section: History
        variable: Avg iso atomic stress *
        transform: Stacked to (n_frames, n_atoms) with NaN padding.
      loavg_values:
        section: History
        variable: LoAvg atomic stress *
        transform: Each frame reshaped to (-1, 6); stacked to (n_frames, n_atoms, 6) with NaN padding.
      loavg_iso_values:
        section: History
        variable: LoAvg iso atom stress *
        transform: Stacked to (n_frames, n_atoms) with NaN padding.
      components:
        source: fixed
        value:
        - xx
        - yy
        - zz
        - yx
        - zx
        - zy
    notes: []
