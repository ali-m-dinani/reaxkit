    related_workflow_module: reaxkit.workflows.file_tools.trainset_workflow
    aliases:
    - make trainset settings
    - make_trainset_settings
    - generate trainset settings
    - heatfo settings
    - trainset heatfo settings
    help_search_examples:
    - reaxkit help "make training set settings"
