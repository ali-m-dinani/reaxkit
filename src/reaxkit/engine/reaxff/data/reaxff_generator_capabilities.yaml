_meta:
  version: '1.0'
  source: reaxkit.engine.reaxff.generators.*
  purpose: Maps ReaxFF generator functions to searchable capabilities and workflow
    links.
  last_updated: '2026-05-21'
generators:
  add_restraints_to_geo:
    description: Add bond/angle/torsion/mass-center restraint blocks to GEO files.
    tags:
    - geo
    - generator
    - restraint
    - bond restraint
    - angle restraint
    - torsion
    - constraints
    implementation_module: 'reaxkit.engine.reaxff.generators.geo_generator: add_restraints_to_geo'
    related_workflow_module: 'reaxkit.workflows.file_tools.geo_workflow: add-geo-restraint'
    notes:
    - Exposed via reaxkit add-geo-restraint.
    - Implemented by add_restraints_to_geo in geo_generator.
    aliases:
    - add geo restraint
    - add_geo_restraint
    help_search_examples:
    - reaxkit help "add geometry file restraint"
    - run add geometry file restraint
  xtob:
    description: Convert XYZ structures into ReaxFF GEO/XTLGRF format.
