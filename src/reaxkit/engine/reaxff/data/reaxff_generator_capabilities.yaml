# Searchable capability index for ReaxFF generator functions.
# Used by `reaxkit help` to discover generator-side features from natural
# language queries, then link those features to source generator modules.

_meta:
  version: '1.0'
  source: reaxkit.engine.reaxff.generators.*
  purpose: Maps ReaxFF generator functions to searchable capabilities and workflow links.
  last_updated: '2026-05-21'
generators:
  add_restraints_to_geo:
    description: Add bond/angle/torsion/mass-center restraint blocks to GEO files.
    tags:
    - geo
    - generator
    - restraint
    - bond restraint
    - angle restraint
    - torsion
    - constraints
    implementation_module: reaxkit.engine.reaxff.generators.geo_generator
    related_workflow_module: reaxkit.workflows.file_tools.geo_workflow
    notes:
    - Exposed via reaxkit add-geo-restraint.
    - Implemented by add_restraints_to_geo in geo_generator.
    aliases:
    - add geo restraint
    - add_geo_restraint
    help_search_examples:
    - reaxkit help "add geometry file restraint"
    - run add geometry file restraint
  xtob:
    description: Convert XYZ structures into ReaxFF GEO/XTLGRF format.
    tags:
    - geo
    - generator
    - xtob
    - conversion
    - xyz
    implementation_module: reaxkit.engine.reaxff.generators.geo_generator
    related_workflow_module: reaxkit.workflows.file_tools.geo_workflow
    aliases:
    - xtob
    help_search_examples:
    - reaxkit help "trajectory coordinates to geometry file"
    - run trajectory coordinates to geometry file
  generate_a_given_eregime:
    description: Generate eregime.in electric-field schedules (sin, pulse, function).
    tags:
    - eregime
    - electric field
    - generator
    - schedule
    - field
    implementation_module: reaxkit.engine.reaxff.generators.eregime_generator
    related_workflow_module: reaxkit.workflows.file_tools.eregime_workflow
    aliases:
    - make eregime
    - make_eregime
    - generate eregime
    help_search_examples:
    - reaxkit help "make electric field regime"
    - make electric field regime
  generate_charges_template:
