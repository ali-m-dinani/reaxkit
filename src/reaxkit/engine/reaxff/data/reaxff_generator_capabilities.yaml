    related_workflow_module: 'reaxkit.workflows.file_tools.geo_workflow: add_restraints_to_geo'
    notes:
    - Exposed via reaxkit add_restraints_to_geo.
    - Implemented by add_restraints_to_geo in geo_generator.
    aliases:
    - add geo restraint
    - add_geo_restraint
    help_search_examples:
    - reaxkit help "add geometry file restraint"
    - run add geometry file restraint
