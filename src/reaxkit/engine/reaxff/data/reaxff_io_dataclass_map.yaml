    - moldyn.vel
    - molsav
  load_electric_field:
    dataclass: ElectricFieldData
    primary_files:
    - fort.78
    supplemental_files: []
    notes: []
    merge_strategy: ''
    composed_of: []
    fallback_files: []
  load_molecular_analysis:
