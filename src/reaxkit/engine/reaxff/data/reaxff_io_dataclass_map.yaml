    primary_files:
    - params
    supplemental_files: []
    notes: []
    merge_strategy: ''
    composed_of: []
    fallback_files: []
  load_parameter_optimization_diagnostic:
    dataclass: ForceFieldOptimizationDiagnosticData
    primary_files:
    - fort.79
    supplemental_files: []
    notes: []
    merge_strategy: ''
    composed_of: []
    fallback_files: []
  load_structure_summary:
