writers:
  write_control:
    description: Reads an existing control file as ControlParametersData, applies overrides, and writes a canonical control
      file.
    dataclass: ControlParametersData
    generator: control_generator
    generator_function: write_control
    generator_module: reaxkit.engine.reaxff.generators.control_generator
    workflow_command: write-control
    workflow_module: reaxkit.workflows.file_tools.control_workflow
    output_files:
    - control
