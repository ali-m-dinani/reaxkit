    notes: []
    merge_strategy: ''
    composed_of: []
    fallback_files: []
  load_partial_energy:
    dataclass: PartialEnergyData
    primary_files:
    - fort.73
    supplemental_files: []
    notes:
    - If input is a directory, adapter checks fort.73, then energylog, then fort.58.
    merge_strategy: ''
    composed_of: []
    fallback_files:
    - energylog
    - fort.58
  load_restraints:
    dataclass: RestraintData
    primary_files:
