# ReaxFF loader/writer mapping used by `reaxkit help`.
# Tracks read-side loaders and write-side operations as structured YAML metadata.

_meta:
  version: '1.2'
  source: reaxkit.engine.reaxff.adapter.ReaxFFAdapter + file-tool workflows
  purpose: Maps ReaxFF loaders and writers to dataclasses and related files/generators.
  last_updated: '2026-05-21'
loaders:
  load_trajectory:
    dataclass: TrajectoryData
    primary_files:
    - xmolout
    supplemental_files:
    - summary.txt
    notes:
    - Trajectory frames are read from xmolout.
    - Simulation-level fields may be merged from summary.txt when available.
    merge_strategy: ''
    composed_of: []
    fallback_files: []
  load_geometry:
    dataclass: GeometryData
    primary_files:
    - geo
    supplemental_files: []
    notes: []
    merge_strategy: ''
    composed_of: []
    fallback_files: []
  load_simulation:
    dataclass: SimulationData
    primary_files:
    - xmolout
    - summary.txt
    supplemental_files: []
    notes:
    - Returns error if neither xmolout nor summary.txt exists.
    merge_strategy: xmolout + summary.txt (if both are available)
    composed_of: []
    fallback_files: []
  load_connectivity:
    dataclass: ConnectivityData
    primary_files:
    - fort.7
    supplemental_files:
    - xmolout
    - summary.txt
    notes:
    - Bond/connectivity content is read from fort.7.
    - Atom IDs/elements and shared simulation fields may be merged from xmolout/summary.txt.
    merge_strategy: ''
    composed_of: []
    fallback_files: []
  load_connectivity_trajectory:
    dataclass: ConnectivityTrajectoryData
    primary_files:
    - fort.7
    - xmolout
    supplemental_files:
    - summary.txt
    notes: []
    merge_strategy: ''
    composed_of:
    - ConnectivityData
    - TrajectoryData
    fallback_files: []
  load_force_field:
    dataclass: ForceFieldParametersData
    primary_files:
    - ffield
    supplemental_files: []
    notes: []
    merge_strategy: ''
    composed_of: []
