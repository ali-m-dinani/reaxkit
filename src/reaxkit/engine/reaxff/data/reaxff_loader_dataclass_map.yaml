_meta:
  version: "1.0"
  source: "reaxkit.engine.reaxff.adapter.ReaxFFAdapter"
  purpose: "Maps ReaxFF loader entrypoints to produced dataclasses and the file inputs they consume."
  last_updated: "2026-03-04"

loaders:
  load_trajectory:
    dataclass: TrajectoryData
    primary_files: [xmolout]
    supplemental_files: [summary.txt]
    notes:
      - "Trajectory frames are read from xmolout."
      - "Simulation-level fields may be merged from summary.txt when available."

  load_geometry:
    dataclass: GeometryData
    primary_files: [geo]

  load_simulation:
    dataclass: SimulationData
    primary_files: [xmolout, summary.txt]
    merge_strategy: "xmolout + summary.txt (if both are available)"
    notes:
      - "Returns error if neither xmolout nor summary.txt exists."

  load_connectivity:
    dataclass: ConnectivityData
    primary_files: [fort.7]
    supplemental_files: [xmolout, summary.txt]
    notes:
      - "Bond/connectivity content is read from fort.7."
      - "Atom IDs/elements and shared simulation fields may be merged from xmolout/summary.txt."

  load_connectivity_trajectory:
    dataclass: ConnectivityTrajectoryData
    primary_files: [fort.7, xmolout]
    supplemental_files: [summary.txt]
    composed_of: [ConnectivityData, TrajectoryData]

  load_force_field:
    dataclass: ForceFieldParametersData
    primary_files: [ffield]

  load_force_field_optimization:
    dataclass: ForceFieldOptimizationProgressData
    primary_files: [fort.13]

  load_force_field_optimization_report:
    dataclass: ForceFieldOptimizationReportData
    primary_files: [fort.99]

  load_force_field_optimization_training_set:
    dataclass: ForceFieldOptimizationTrainingSetData
    primary_files: [trainset.in]

  load_force_field_optimization_parameters:
    dataclass: ForceFieldOptimizationParameterData
    primary_files: [params]

  load_parameter_optimization_diagnostic:
    dataclass: ForceFieldOptimizationDiagnosticData
    primary_files: [fort.79]

  load_structure_summary:
    dataclass: GeometrySummaryData
    primary_files: [fort.74]

  load_partial_energy:
    dataclass: PartialEnergyData
    primary_files: [fort.73]
    fallback_files: [energylog, fort.58]
    notes:
      - "If input is a directory, adapter checks fort.73, then energylog, then fort.58."

  load_restraints:
    dataclass: RestraintData
    primary_files: [fort.76]

  load_geometry_optimization:
    dataclass: GeometryOptimizationProgressData
    primary_files: [fort.57]

  load_control_parameters:
    dataclass: ControlParametersData
    primary_files: [control]

  load_eregime:
    dataclass: EregimeData
    primary_files: [eregime.in]

  load_charges:
    dataclass: ChargeData
    primary_files: [fort.7]
    supplemental_files: [xmolout, summary.txt]
    notes:
      - "Charge values come from fort.7."
      - "Simulation metadata may be merged from xmolout/summary.txt."

  load_atomic_kinematics:
    dataclass: AtomicKinematicsData
    primary_files: [vels]
    fallback_files: [moldyn.vel, molsav]
    notes:
      - "If input is a directory, adapter checks vels, then moldyn.vel, then molsav."

  load_electric_field:
    dataclass: ElectricFieldData
    primary_files: [fort.78]

  load_molecular_analysis:
    dataclass: MolecularAnalysisData
    primary_files: [molfra.out]
    fallback_files: [molfra_ig.out]
