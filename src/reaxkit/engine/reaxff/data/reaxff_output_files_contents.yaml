_meta:
  version: '1.0'
  comment: generated using reaxff_output_files_contents.xlsx
  last_updated: '2026-05-21'
files:
  energylog:
    description: 'Energy log written during MD by AMS: iteration/time and per-term
      energy contributions, which resembles fort.73 in structure.'
    implementation_module: 'reaxkit.engine.reaxff.io.fort73_handler: load_partial_energy'
    aliases:
    - energy log
    - partial energy log
    - molecular dynamics energy log
    help_search_examples:
    - reaxkit help "energy log"
    - inspect molecular dynamics energy log
    related_run:
    - MD
    tags:
    - energy
    - md
    - thermodynamics
    - log
    core_vars:
    - iteration
    - Partial energy contribution report (Energy terms)
    derived_vars: []
    best_for:
    - energy vs time
    - monitoring MD stability
    notes:
    - The output-frequency to fort.73 is regulated by control-file keyword iout1
    - The sum of these terms should be the same as the number in the Epot-column in
      fort.71.
  fort.13:
    description: 'Force-field optimization error summary: reports total error (objective)
      for the current force field.'
    implementation_module: 'reaxkit.engine.reaxff.io.fort13_handler: load_force_field_optimization'
    aliases:
    - force field optimization error
    - fort 13
    - optimization objective
    help_search_examples:
    - reaxkit help "force field optimization error"
    - monitor force field optimization objective
    related_run:
    - FF-optimization
    tags:
    - ff-optimization
    - error
    - objective
    core_vars:
    - total error of the force field
    derived_vars: []
    best_for:
    - monitor optimization error
  fort.57:
    description: 'MM/minimization progress log: iteration, potential energy, RMS force
      (RMSG), and optimizer diagnostics.'
    implementation_module: 'reaxkit.engine.reaxff.io.fort57_handler: load_geometry_optimization'
    aliases:
    - minimization progress
    - fort 57
    - geometry optimization progress
    help_search_examples:
    - reaxkit help "geometry optimization progress"
    - inspect minimization convergence
    related_run:
    - MM
    tags:
    - mm
    - minimization
    - convergence
    - optimizer
    core_vars:
    - iteration
    - potential energy
    - RMSG (force RMS gradient)
    - Optimizer diagnostics (max move, factor, nfc)
    derived_vars: []
    best_for:
    - minimization convergence
    notes:
    - When RMSG drops below the value of control-file keyword endmm the MM run terminates.
    - Alternatively, the run terminates when the maximum number of iterations (control-file
      keyword maxit) has been reached.
  fort.58:
    description: 'MM/minimization energy-term report: iteration and partial energy
      contribution table, which resembles fort.73 in structure.'
    implementation_module: 'reaxkit.engine.reaxff.io.fort73_handler: load_partial_energy'
    aliases:
    - minimization energy terms
    - fort 58
    - energy breakdown
    help_search_examples:
    - reaxkit help "energy breakdown"
    - inspect minimization energy terms
    related_run:
    - MM
    tags:
    - energy
    - mm
    - minimization
    core_vars:
    - simulation name (=geo description)
    - iteration
    - Partial energy contribution report (Energy terms)
    derived_vars: []
    best_for:
    - energy breakdown in MM runs
  fort.7:
    description: 'Connectivity (bond-order) table: per-atom neighbor list, bond orders,
      molecule IDs, charges (only bonds above a cutoff are stored).'
    implementation_module: 'reaxkit.engine.reaxff.io.fort7_handler: load_connectivity'
    aliases:
    - connectivity file
    - bond order table
    - fort 7
    help_search_examples:
    - reaxkit help "connectivity file"
    - analyze bond order table
    related_run:
    - MD
    - MM
    - FF-optimization
    tags:
    - connectivity
    - bond-order
    - species
    - charges
    - coordination analysis
    - dipole moments
    - polarization
    core_vars:
    - 'Header: number of atoms & structure identifier (=geo descriptor)'
    - atom number
    - atom type number
    - atom connectivity (neighbor indices)
    - Molecule number
    - Bond orders for each listed connectivity (neighbor)
    - Sum of bond orders
    - Number of lone pairs
    - Partial charge
    derived_vars:
    - coordination workflow (accessed through CLI by reaxkit coord) analyzes and relabels
      atoms based on their coordination status
    - electrostatics workflow (accessed through CLI by reaxkit elect) obtains dipole
      moments, polarization, hysteresis, etc.
    best_for:
    - bonding topology
    - species tracking
    - electrostatics
    notes:
    - This file gets updated with the same frequency as the xmolout-file; every iout2
      iterations during MD simulations or every iout4 iterations during an MM-run.
    - fort.7 contains only the bonds with a bond order greater then control-file keyword
      cutof2.
    - fort.7 and fort.8 get overwritten by the most recent information. Setting control-file
      keyword iappen to 1, though, causes output to these files to get appended.
  fort.73:
    description: 'Energy-term output: iteration/time and partial energy contributions
      (bonded, nonbonded, total).'
    implementation_module: 'reaxkit.engine.reaxff.io.fort73_handler: load_partial_energy'
    aliases:
    - partial energy
    - energy terms
    - fort 73
    help_search_examples:
    - reaxkit help "partial energy"
    - plot partial energy time series
    related_run:
    - MD
    tags:
    - energy
    - thermodynamics
    - output
    core_vars:
    - iteration
    - Partial energy contribution report (Energy terms)
    derived_vars: []
    best_for:
    - energy decomposition
    - run diagnostics
    notes:
    - The output-frequency to fort.73 is regulated by control-file keyword iout1
    - The sum of these terms should be the same as the number in the Epot-column in
      fort.71.
  fort.74:
    description: 'MM/FF-optimization summary table: per-structure/epoch values such
      as minimum energy, heat of formation, volume, and density.'
    implementation_module: 'reaxkit.engine.reaxff.io.fort74_handler: load_structure_summary'
    aliases:
    - structure summary
    - heat of formation summary
    - fort 74
    help_search_examples:
    - reaxkit help "structure summary"
    - inspect heat of formation summary
    related_run:
    - MM
    - FF-optimization
    tags:
    - summary
    - mm
    - ff-optimization
    - thermo
    core_vars:
    - simulation name (=geo description)
    - MM energy (minimum potential energy)
    - epoch
    - heat of formation
    - volume
    - density
    derived_vars:
    - in conjunction with fort.99, it is used to obtain energy-volume data and bulk
      modulus
    best_for:
    - tabulated MM/optimization summary
    - EOS
    - equation of state. bulk modulus
  fort.76:
    description: 'Restraint output: iteration, restraint energy, potential energy,
      and target vs actual restraint distances.'
    implementation_module: 'reaxkit.engine.reaxff.io.fort76_handler: load_restraints'
    aliases:
    - restraint output
    - restraint diagnostics
    - fort 76
    help_search_examples:
    - reaxkit help "restraint output"
    - inspect restraint diagnostics
    related_run:
    - MD
    tags:
    - restraint
    - constraints
    - bias
    - md
    core_vars:
    - iteration
    - restraint energy
    - potential energy
    - 'restraint distances: target and actual pairs'
    derived_vars: []
    best_for:
    - restraint diagnostics
  fort.78:
    description: 'Electric-field output: iteration, field components/magnitudes and
      the associated electric-field energy term.'
    implementation_module: 'reaxkit.engine.reaxff.io.fort78_handler: load_electric_field'
    aliases:
    - electric field output
    - electric field data
    - fort 78
    help_search_examples:
    - reaxkit help "electric field output"
    - analyze electric field data
    related_run:
    - MD
    tags:
    - electric-field
    - md
    - external-field
    core_vars:
    - iteration
    - electric field magnitude in different directions (x,y,z)
    - electric field magnitude
    - energy of electric field in different directions (x,y,z)
    - energy of electric field
    derived_vars:
    - used in electrostatics workflow to obtain polarization hystereis loops
    best_for:
    - field schedule diagnostics
    - polarization hysteresis
  fort.79:
    description: 'FF-optimization parabola-fit report: logs parameter trial values,
      fitted parabola coefficients, optimum estimate, and error values.'
    implementation_module: 'reaxkit.engine.reaxff.io.fort79_handler: load_parameter_optimization_diagnostic'
    aliases:
    - parameter optimization diagnostic
    - parabola fit report
    - fort 79
    help_search_examples:
    - reaxkit help "parameter optimization diagnostic"
    - inspect parabola fit report
    related_run:
    - FF-optimization
    tags:
    - ff-optimization
    - parabola-fit
    - line-search
    core_vars:
    - parameter identifier (shown by the first 3 values)
    - parameter values (3 initial values)
    - total errors of the force field (for the 3 initial values)
    - parabola parameters (a,b,c)
    - parabola minumum (optimal parameter value)
    - total errors of the force field for the parabola minimum
    - new parameter value
    - total errors of the force field for the new parameter value
    derived_vars: []
    best_for:
    - debug/inspect optimization steps
    notes:
    - This file contains the report from the parabolic extrapolation procedure used
      by ReaxFF to optimize the force field parameters.
  fort.8:
    description: Connectivity (bond-order) table similar to fort.7, typically updated
      at a given frequency and overwritten by the latest snapshot.
    implementation_module: 'reaxkit.engine.reaxff.io.fort7_handler: file_handler'
    aliases:
    - latest connectivity snapshot
    - bond order snapshot
    - fort 8
    help_search_examples:
    - reaxkit help "latest connectivity snapshot"
    - inspect bond order snapshot
    related_run:
    - MD
    - MM
    - FF-optimization
    tags:
    - connectivity
    - bond-order
    - snapshot
    core_vars:
    - 'Header: number of atoms & structure identifier (=geo descriptor)'
    - atom number [integer]
    - atom type number [integer]
    - atom connectivity (neighbor indices) [integer]
    - Molecule number [integer]
    - Bond orders for each listed connectivity (neighbor)
    - Sum of bond orders
    - Number of lone pairs
    - Partial charge
    derived_vars: []
    best_for:
    - latest bonding snapshot
    notes:
    - This file gets updated with the same frequency as the xmolout-file; every iout2
      iterations during MD simulations or every iout4 iterations during an MM-run.
    - fort.7 and fort.8 get overwritten by the most recent information. Setting control-file
      keyword iappen to 1, though, causes output to these files to get appended.
  fort.99:
    description: 'FF-optimization results summary: reports optimized ffield values
      and reference/target comparison metrics (e.g., QM/literature targets).'
    implementation_module: 'reaxkit.engine.reaxff.io.fort99_handler: load_force_field_optimization_report'
    aliases:
    - force field optimization report
    - training set report
    - fort 99
    help_search_examples:
    - reaxkit help "force field optimization report"
    - inspect training set report
    related_run:
    - FF-optimization
    tags:
    - ff-optimization
    - results
    - summary
    core_vars:
    - ff-optimization results (ffield value, QM/literature value, weight, error, total
      error)
    derived_vars:
    - equation of state, bulk modulus, etc.
    best_for:
    - final optimization report
    - EOS
    - equation of state
    - bulk modulus
  moldyn.vel:
    description: 'MD restart file (latest): coordinates, velocities, accelerations,
      and temperature state for restarting a run.'
    implementation_module: 'reaxkit.engine.reaxff.io.vels_handler: load_atomic_kinematics'
    aliases:
    - restart velocities
    - moldyn velocities
    - molecular dynamics restart
    help_search_examples:
    - reaxkit help "restart velocities"
    - continue molecular dynamics from restart velocities
    related_run:
    - MD
    tags:
    - restart
    - md
    - velocities
    core_vars:
    - Atom coordinates
    - Atom velocities
    - Atom accelerations
    - Previous atom accelerations
    - MD temperature
    derived_vars: []
    best_for:
    - restart MD
  molfra.out:
    description: 'Molecular species report: per-iteration species counts/fractions
      (molecule fragments) during MD.'
    implementation_module: 'reaxkit.engine.reaxff.io.molfra_handler: load_molecular_analysis'
    aliases:
    - molecular species report
    - molecule fragments
    - molfra
    help_search_examples:
    - reaxkit help "molecular species report"
    - plot molecular species over time
    related_run:
    - MD
    tags:
    - species
    - fragments
    - md
    core_vars:
    - molecular species report (iteration, frequency, molecular formula, molecular
      mass, total molecules, total atoms, total molecular mass)
    derived_vars:
    - 'ReaxKit: species time series; plot counts vs iteration'
    best_for:
    - species evolution
  molsav.####:
    description: 'MD restart snapshots written periodically: same contents as moldyn.vel
      but saved with an index.'
    implementation_module: 'reaxkit.engine.reaxff.io.vels_handler: load_atomic_kinematics'
    aliases:
    - restart snapshot
    - molsav snapshot
    - molecular dynamics restart snapshot
    help_search_examples:
    - reaxkit help "restart snapshot"
    - restart molecular dynamics from snapshot
    related_run:
    - MD
    tags:
    - restart
    - md
    - snapshots
    core_vars:
    - Atom coordinates
    - Atom velocities
    - Atom accelerations
    - Previous atom accelerations
    - MD temperature
    derived_vars: []
    best_for:
    - restart from earlier point
  summary:
    description: 'Compact run summary time series: iteration/time plus global quantities
      like temperature, pressure, density, volume, potential energy, and molecule
      count.'
    implementation_module: 'reaxkit.engine.reaxff.io.summary_handler: load_simulation'
    aliases:
    - simulation summary
    - run summary
    - simulation time series
    help_search_examples:
    - reaxkit help "simulation summary"
    - plot simulation time series
    related_run:
    - MD
    - MM
    - FF-optimization
    tags:
    - summary
    - thermo
    - time-series
    core_vars:
    - iteration
    - number of molecules
    - simulation time (fs)
    - potential energy
    - volume
    - temperature
    - pressure
    - density
    - elapsed time (s)
    derived_vars: []
    best_for:
    - quick run monitoring
  xmolout:
    description: 'Trajectory output: per-frame atomic positions; may also include
      cell parameters and per-frame energies; optional velocities/molecule IDs.'
    implementation_module: 'reaxkit.engine.reaxff.io.xmolout_handler: load_trajectory'
    aliases:
    - trajectory output
    - trajectory coordinates
    - xmolout trajectory
    help_search_examples:
    - reaxkit help "trajectory coordinates"
    - analyze trajectory coordinates
    related_run:
    - MD
    - MM
    - FF-optimization
    tags:
    - trajectory
    - coordinates
    - structure
    - unit-cell
    - msd
    - rdf
    - coordination
    - connectivity
    - dipole moment
    - polarization
    core_vars:
    - number of atoms
    - simulation name (=geo description)
    - iteration
    - potential energy
    - unit cell dimensions (a,b,c)
    - unit cell angles (alpha, beta, gamma)
    - atom types
    - atom coordinates (x,y,z)
    optional_vars:
    - velocities
    - molecule number
    - strain energy
    - total bond order
    derived_vars:
    - MSD (mean square displacement)
    - RDF (radial distribution function)
    - diffusion coefficient
    - connectivity workflow is used to analyze and relabel the coordination status
      of atoms (xmolout is used in conjunction with fort.7)
    - electrostatics workflow is used to obtain dipole moments, polarizations, etc.
      (xmolout is used in conjunction with fort.7)
    - spatial-property direct commands are used to plot charge or connectivity values
      on atomic coordinates (for example atom_property_plot3d and atom_property_heatmap2d)
    best_for:
    - trajectory analysis
    - structure evolution
    notes:
    - In MD-runs, the frequency of structure output to xmolout is controlled by the
      control-file keyword iout2; a frame is saved every iout2 MD-iterations.
    - In a similar way, iout4 controls the frame output frequency during MM simulations.
    - If the ixmolo control-switch has a value of 1 additional velocity and molecule
      number output is generated in the xmolout-file.
    - Optional fields depend on control settings and build options.
